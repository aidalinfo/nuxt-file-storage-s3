name: NPM Publish

on:
  push:
    branches: [master]
    paths:
      - 'package.json'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
          scope: '@aidalinfo'

      - name: Get package version
        id: package
        run: |
          VERSION=$(node -p "require('./package.json').version")
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "name=$PACKAGE_NAME" >> $GITHUB_OUTPUT
          echo "Package: $PACKAGE_NAME@$VERSION"

      - name: Check if version exists on NPM
        id: npm-check
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if npm view ${{ steps.package.outputs.name }}@${{ steps.package.outputs.version }} version 2>/dev/null; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Version ${{ steps.package.outputs.version }} already exists on NPM"
            exit 1
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "Version ${{ steps.package.outputs.version }} does not exist on NPM"
          fi

      - name: Install dependencies
        run: npm i

      - name: Install dependencies ci
        run: npm ci

      - name: Build package
        run: npm run prepack

      - name: Publish to NPM
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create Release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ steps.package.outputs.version }}
          name: nuxt-file-storage-s3 - Release v${{ steps.package.outputs.version }}
          body: |
            ## Changes

            Package ${{ steps.package.outputs.name }} has been updated to version ${{ steps.package.outputs.version }}.
          draft: false
          prerelease: false
